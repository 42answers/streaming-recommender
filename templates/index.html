<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Finder NL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #08090a;
            color: #d4d4d4;
            min-height: 100vh;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 80px 20px 50px;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 1px;
            background: #333;
        }

        .header h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2.8rem;
            font-weight: 400;
            color: #fff;
            letter-spacing: 0.04em;
            margin-bottom: 12px;
        }

        .header p {
            color: #555;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* Search */
        .search-panel {
            max-width: 560px;
            margin: 50px auto 0;
            padding: 0 24px;
        }

        .form-group { margin-bottom: 24px; }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #999;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .media-toggle {
            display: flex;
            gap: 1px;
            margin-bottom: 32px;
            background: #1a1a1a;
            border-radius: 6px;
            overflow: hidden;
        }

        .media-toggle button {
            flex: 1;
            padding: 14px;
            border: none;
            background: transparent;
            color: #888;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .media-toggle button.active {
            color: #fff;
            background: #1f1f1f;
        }

        input, select {
            width: 100%;
            padding: 14px 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid #444;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 300;
            transition: border-color 0.3s ease;
            border-radius: 0;
            -webkit-appearance: none;
        }

        select { cursor: pointer; }
        select option { background: #111; color: #d4d4d4; }

        input:focus, select:focus {
            outline: none;
            border-bottom-color: #fff;
        }

        input::placeholder { color: #666; font-weight: 300; }

        .services {
            display: flex;
            gap: 10px;
        }

        .service-btn {
            flex: 1;
            padding: 12px 0;
            border: 1px solid #222;
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
            color: #444;
        }

        .service-btn.active.netflix { border-color: #444; color: #e50914; }
        .service-btn.active.amazon { border-color: #444; color: #00a8e1; }
        .service-btn.active.disney { border-color: #444; color: #738adb; }
        .service-btn.active.hbo { border-color: #444; color: #a17dc8; }
        .service-btn.active.videoland { border-color: #444; color: #e87c03; }

        .form-group.filter {
            padding: 16px 20px;
            margin-left: -20px;
            margin-right: -20px;
            border-radius: 6px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .form-group.filter.active-filter {
            background: rgba(255, 255, 255, 0.04);
            border-left: 2px solid #fff;
        }

        .form-group.filter.active-filter label {
            color: #fff;
        }

        .form-group.filter:not(.active-filter) label {
            color: #999;
        }

        .form-group.filter:not(.active-filter) input,
        .form-group.filter:not(.active-filter) select {
            opacity: 0.5;
        }

        .form-group.filter:not(.active-filter):hover input,
        .form-group.filter:not(.active-filter):hover select {
            opacity: 0.75;
        }

        .divider {
            text-align: center;
            color: #ffffff;
            margin: 20px 0;
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        .search-btn {
            width: 100%;
            padding: 16px;
            background: #fff;
            border: none;
            border-radius: 4px;
            color: #000;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .search-btn:hover { background: #e0e0e0; }
        .search-btn:disabled { background: #222; color: #444; cursor: not-allowed; }

        /* Results */
        .results {
            max-width: 900px;
            margin: 60px auto 80px;
            padding: 0 24px;
        }

        .results-header {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.6rem;
            font-weight: 400;
            color: #fff;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #1a1a1a;
        }

        .movie-card {
            display: flex;
            gap: 28px;
            padding: 32px 0;
            border-bottom: 1px solid #111;
            transition: opacity 0.3s ease;
        }

        .movie-card:hover { opacity: 0.85; }

        .rank {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.8rem;
            font-weight: 400;
            color: #444;
            min-width: 36px;
            padding-top: 4px;
        }

        .poster {
            width: 130px;
            min-width: 130px;
            border-radius: 3px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }

        .poster img {
            width: 100%;
            height: auto;
            display: block;
        }

        .info { flex: 1; padding-top: 2px; }

        .info h3 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.35rem;
            font-weight: 400;
            margin-bottom: 8px;
        }

        .info h3 a {
            color: #fff;
            text-decoration: none;
            transition: color 0.2s;
        }

        .info h3 a:hover { color: #999; }

        .meta {
            display: flex;
            gap: 14px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
            font-size: 0.82rem;
        }

        .meta .year {
            color: #aaa;
            font-weight: 400;
        }

        .meta .genres {
            color: #999;
            font-weight: 300;
        }

        .meta .language {
            color: #889;
            font-weight: 300;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        .badge.rt { color: #e74c3c; }
        .badge.rt.fresh { color: #6fcf6f; }
        .badge.imdb { color: #d4a520; }

        .stream-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .stream-badge {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .stream-badge.netflix { color: #e50914; }
        .stream-badge.amazon { color: #00a8e1; }
        .stream-badge.disney { color: #738adb; }
        .stream-badge.hbo { color: #a17dc8; }
        .stream-badge.videoland { color: #e87c03; }

        .awards {
            font-size: 0.78rem;
            color: #b8aade;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .overview {
            color: #c8c8c8;
            font-size: 0.85rem;
            line-height: 1.7;
            font-weight: 300;
            margin-bottom: 10px;
        }

        .review {
            margin-top: 8px;
        }

        .review p {
            font-size: 0.8rem;
            color: #b0a4d8;
            font-style: italic;
            line-height: 1.5;
            font-weight: 300;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 80px 20px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 1.5px solid #222;
            border-top-color: #666;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading p {
            color: #444;
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .error {
            text-align: center;
            padding: 60px;
            color: #666;
            font-weight: 300;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .header { padding: 50px 20px 30px; }
            .header h1 { font-size: 2rem; }
            .movie-card { flex-wrap: wrap; gap: 16px; }
            .rank { min-width: 28px; font-size: 1.4rem; }
            .poster { width: 100px; min-width: 100px; }
            .services { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Stream Finder</h1>
        <p>Netherlands &middot; Netflix &middot; Amazon &middot; Disney+</p>
    </div>

    <div class="search-panel">
        <div class="media-toggle">
            <button id="btn-movie" class="active" onclick="setMediaType('movie')">Films</button>
            <button id="btn-tv" onclick="setMediaType('tv')">Series</button>
        </div>

        <div class="form-group filter" id="filter-genre">
            <label>Genre</label>
            <select id="genre" onchange="activateFilter('genre')">
                <option value="">Choose a genre</option>
            </select>
        </div>

        <div class="divider">or</div>

        <div class="form-group filter" id="filter-similar" onclick="document.getElementById('similar_to').focus()">
            <label>Similar to</label>
            <input type="text" id="similar_to" placeholder="Inception, Breaking Bad, Parasite..." oninput="activateFilter('similar')">
        </div>

        <div class="divider">or</div>

        <div class="form-group filter" id="filter-award">
            <label>Award</label>
            <select id="award" onchange="activateFilter('award')">
                <option value="">Choose an award</option>
            </select>
        </div>

        <div class="form-group" style="margin-top: 32px;">
            <label>Available on</label>
            <div class="services">
                <button class="service-btn netflix active" data-service="netflix" onclick="toggleService(this)">Netflix</button>
                <button class="service-btn amazon active" data-service="amazon" onclick="toggleService(this)">Amazon Prime</button>
                <button class="service-btn disney active" data-service="disney" onclick="toggleService(this)">Disney+</button>
                <button class="service-btn hbo active" data-service="hbo" onclick="toggleService(this)">HBO Max</button>
                <button class="service-btn videoland active" data-service="videoland" onclick="toggleService(this)">Videoland</button>
            </div>
        </div>

        <button class="search-btn" onclick="search()">Find Top 20</button>
    </div>

    <div id="results" class="results"></div>

    <script>
        let mediaType = 'movie';
        let allResults = [];
        let shownCount = 0;
        const PAGE_SIZE = 20;

        function setMediaType(type) {
            mediaType = type;
            document.getElementById('btn-movie').classList.toggle('active', type === 'movie');
            document.getElementById('btn-tv').classList.toggle('active', type === 'tv');
            loadGenres();
        }

        function toggleService(btn) {
            btn.classList.toggle('active');
        }

        function activateFilter(type) {
            const filters = document.querySelectorAll('.form-group.filter');
            filters.forEach(f => f.classList.remove('active-filter'));

            if (type === 'genre' && document.getElementById('genre').value) {
                document.getElementById('filter-genre').classList.add('active-filter');
                document.getElementById('similar_to').value = '';
                document.getElementById('award').value = '';
            } else if (type === 'similar' && document.getElementById('similar_to').value.trim()) {
                document.getElementById('filter-similar').classList.add('active-filter');
                document.getElementById('genre').value = '';
                document.getElementById('award').value = '';
            } else if (type === 'award' && document.getElementById('award').value) {
                document.getElementById('filter-award').classList.add('active-filter');
                document.getElementById('genre').value = '';
                document.getElementById('similar_to').value = '';
            }
        }

        async function loadGenres() {
            const resp = await fetch(`/api/genres?media_type=${mediaType}`);
            const genres = await resp.json();
            const select = document.getElementById('genre');
            select.innerHTML = '<option value="">Choose a genre</option>';
            genres.forEach(g => {
                select.innerHTML += `<option value="${g.name}">${g.name}</option>`;
            });
        }

        async function loadAwards() {
            const resp = await fetch('/api/awards');
            const awards = await resp.json();
            const select = document.getElementById('award');
            select.innerHTML = '<option value="">Choose an award</option>';
            awards.forEach(a => {
                select.innerHTML += `<option value="${a.id}">${a.name}</option>`;
            });
        }

        const serviceClassMap = {'Netflix': 'netflix', 'Amazon Prime': 'amazon', 'Disney+': 'disney', 'HBO Max': 'hbo', 'Videoland': 'videoland'};

        function renderCard(m, index) {
            const rtClass = m.rt_score && m.rt_score >= 60 ? 'fresh' : '';
            const rtBadge = m.rt_score
                ? `<span class="badge rt ${rtClass}">${m.rt_score}%</span>`
                : '';
            const imdbBadge = m.imdb_rating !== 'N/A'
                ? `<span class="badge imdb">${m.imdb_rating}</span>`
                : '';
            const awardsHtml = m.awards && m.awards !== 'N/A'
                ? `<div class="awards">${m.awards}</div>`
                : '';
            const langHtml = m.language
                ? `<span class="language">${m.language}</span>`
                : '';
            const reviewHtml = m.review_text
                ? `<div class="review"><p>${m.review_text}</p></div>`
                : '';
            const streamHtml = m.available_on && m.available_on.length
                ? `<div class="stream-badges">${m.available_on.map(s => `<span class="stream-badge ${serviceClassMap[s] || ''}">${s}</span>`).join('  ')}</div>`
                : '';

            return `
                <div class="movie-card">
                    <div class="rank">${index + 1}</div>
                    <div class="poster">
                        <img src="${m.poster}" alt="${m.title}" onerror="this.style.display='none'">
                    </div>
                    <div class="info">
                        <h3><a href="https://www.imdb.com/title/${m.imdb_id}/" target="_blank">${m.title}</a></h3>
                        <div class="meta">
                            <span class="year">${m.year}</span>
                            ${rtBadge}
                            ${imdbBadge}
                            <span class="genres">${m.genres}</span>
                            ${langHtml}
                        </div>
                        ${streamHtml}
                        ${awardsHtml}
                        <div class="overview">${m.overview.length > 200 ? m.overview.slice(0, 200).replace(/\s+\S*$/, '') + '...' : m.overview}</div>
                        ${reviewHtml}
                    </div>
                </div>`;
        }

        async function loadMore() {
            const btn = document.getElementById('load-more-btn');
            btn.disabled = true;
            btn.textContent = 'Loading reviews...';

            const nextBatch = allResults.slice(shownCount, shownCount + PAGE_SIZE);

            // Fetch reviews for this batch
            try {
                const resp = await fetch('/api/reviews', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ titles: nextBatch }),
                });
                const data = await resp.json();
                if (data.reviews) {
                    nextBatch.forEach(m => {
                        m.review_text = data.reviews[m.title] || null;
                    });
                }
            } catch {}

            // Render cards
            const container = document.getElementById('cards-container');
            nextBatch.forEach((m, i) => {
                container.insertAdjacentHTML('beforeend', renderCard(m, shownCount + i));
            });

            shownCount += nextBatch.length;

            // Update header
            document.getElementById('results-count').textContent = `Top ${shownCount}`;

            // Update or remove button
            if (shownCount >= allResults.length) {
                btn.remove();
            } else {
                btn.disabled = false;
                const remaining = allResults.length - shownCount;
                btn.textContent = `Load next ${Math.min(PAGE_SIZE, remaining)}`;
            }
        }

        async function search() {
            const genre = document.getElementById('genre').value;
            const similarTo = document.getElementById('similar_to').value.trim();
            const award = document.getElementById('award').value;
            const services = [...document.querySelectorAll('.service-btn.active')].map(b => b.dataset.service);

            if (!genre && !similarTo && !award) {
                alert('Please select a genre, enter a title, or pick an award.');
                return;
            }

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Curating your selection...</p>
                    <p style="margin-top: 12px; font-size: 0.72rem; color: #555;">Fetching ratings and reviews &middot; 30-60 seconds</p>
                </div>`;

            document.querySelector('.search-btn').disabled = true;

            try {
                const resp = await fetch('/api/recommend', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        genre: genre,
                        similar_to: similarTo,
                        award: award,
                        services: services,
                        media_type: mediaType,
                    }),
                });

                const data = await resp.json();

                if (data.error) {
                    resultsDiv.innerHTML = `<div class="error">${data.error}</div>`;
                    return;
                }

                if (!data.results || data.results.length === 0) {
                    resultsDiv.innerHTML = `<div class="error">Nothing found. Try different filters.</div>`;
                    return;
                }

                allResults = data.results;
                shownCount = 0;

                const firstBatch = allResults.slice(0, PAGE_SIZE);
                shownCount = firstBatch.length;

                const foundNote = data.total_found
                    ? `<span style="font-family: Inter, sans-serif; font-size: 0.75rem; color: #777; font-weight: 300; margin-left: 16px;">${data.total_found} found streaming in NL</span>`
                    : '';

                let html = `<div class="results-header"><span id="results-count">Top ${shownCount}</span> ${foundNote}</div>`;
                html += `<div id="cards-container">`;
                firstBatch.forEach((m, i) => { html += renderCard(m, i); });
                html += `</div>`;

                if (allResults.length > shownCount) {
                    const remaining = allResults.length - shownCount;
                    html += `<div style="text-align: center; padding: 40px 0;">
                        <button id="load-more-btn" class="search-btn" style="max-width: 300px; margin: 0 auto;" onclick="loadMore()">
                            Load next ${Math.min(PAGE_SIZE, remaining)}
                        </button>
                    </div>`;
                }

                resultsDiv.innerHTML = html;
            } catch (err) {
                resultsDiv.innerHTML = `<div class="error">Something went wrong: ${err.message}</div>`;
            } finally {
                document.querySelector('.search-btn').disabled = false;
            }
        }

        loadGenres();
        loadAwards();
    </script>
</body>
</html>
